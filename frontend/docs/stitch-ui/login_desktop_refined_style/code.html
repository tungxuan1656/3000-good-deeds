<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In | 3000 Good Deeds</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#775917",
              "on-surface-variant": "#444840",
              "on-primary-container": "#cbdebb",
              "surface-container-low": "#f4f4f0",
              "surface-dim": "#dbdad6",
              "secondary-fixed": "#dde5da",
              "error": "#ba1a1a",
              "surface-tint": "#526347",
              "on-tertiary-fixed": "#261900",
              "primary-container": "#526347",
              "on-tertiary-fixed-variant": "#5d4200",
              "on-secondary-container": "#5f665e",
              "on-error": "#ffffff",
              "primary-fixed-dim": "#b9ccaa",
              "on-tertiary": "#ffffff",
              "inverse-surface": "#2f312e",
              "secondary": "#596058",
              "outline-variant": "#c5c8bd",
              "on-primary": "#ffffff",
              "on-background": "#1b1c1a",
              "inverse-on-surface": "#f2f1ed",
              "secondary-container": "#dde5da",
              "primary-fixed": "#d5e9c5",
              "on-secondary-fixed": "#161d17",
              "on-secondary": "#ffffff",
              "surface-bright": "#faf9f5",
              "tertiary": "#5c4200",
              "on-secondary-fixed-variant": "#414941",
              "on-primary-fixed-variant": "#3b4b31",
              "error-container": "#ffdad6",
              "tertiary-fixed-dim": "#e9c175",
              "secondary-fixed-dim": "#c1c9bf",
              "outline": "#75786f",
              "on-error-container": "#93000a",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#e9e8e4",
              "background": "#faf9f5",
              "tertiary-fixed": "#ffdea5",
              "surface-variant": "#e3e2df",
              "on-surface": "#1b1c1a",
              "inverse-primary": "#b9ccaa",
              "surface-container": "#efeeea",
              "primary": "#3b4b31",
              "on-primary-fixed": "#111f09",
              "surface": "#faf9f5",
              "surface-container-highest": "#e3e2df",
              "on-tertiary-container": "#fcd284"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        body { 
            font-family: 'Be Vietnam Pro', sans-serif; 
            background-color: #faf9f5;
        }
        .serif-headline { font-family: 'Noto Serif', serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .btn-primary-gradient {
            background: linear-gradient(135deg, #526347 0%, #46573c 100%);
        }
        .tab-active {
            color: #3b4b31;
            border-bottom: 2px solid #526347;
        }
        /* ROUND_EIGHT matching design system */
        .rounded-eight {
            border-radius: 0.5rem;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-6 text-on-surface">
<!-- Login Container -->
<main class="w-full max-w-md mx-auto">
<!-- Brand Identity -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-high mb-6">
<span class="material-symbols-outlined text-primary text-3xl">eco</span>
</div>
<h1 class="serif-headline text-4xl font-bold text-primary mb-3">3000 Good Deeds</h1>
<p class="text-on-surface-variant font-light tracking-wide italic text-sm">Every small act ripples into eternity</p>
</div>
<!-- Auth Navigation Tabs -->
<div class="flex border-b border-outline-variant/30 mb-8 px-2">
<button class="flex-1 py-3 text-[11px] font-bold tracking-widest uppercase text-primary tab-active">Sign In</button>
<button class="flex-1 py-3 text-[11px] font-bold tracking-widest uppercase text-outline hover:text-primary transition-colors">Create Account</button>
<button class="flex-1 py-3 text-[11px] font-bold tracking-widest uppercase text-outline hover:text-primary transition-colors text-right">Forgot?</button>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0px_10px_30px_rgba(47,52,46,0.04)] relative overflow-hidden">
<!-- Subtle Background Accent -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-primary/5 rounded-full blur-2xl"></div>
<form action="#" class="space-y-6 relative z-10">
<!-- Email Field -->
<div>
<label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.15em] mb-2 px-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-eight bg-surface-container-low text-on-surface placeholder:text-outline-variant/60 focus:ring-1 focus:ring-primary/20 border border-outline-variant/20 outline-none transition-all duration-300" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block text-[10px] font-bold text-on-surface-variant uppercase tracking-[0.15em] mb-2 px-1" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 pl-4 pr-12 rounded-eight bg-surface-container-low text-on-surface placeholder:text-outline-variant/60 focus:ring-1 focus:ring-primary/20 border border-outline-variant/20 outline-none transition-all duration-300" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary p-1" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-12 btn-primary-gradient text-on-primary font-semibold rounded-eight shadow-sm hover:opacity-95 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-lg">login</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="flex-grow h-[1px] bg-outline-variant/20"></div>
<span class="text-[10px] text-outline font-bold uppercase tracking-widest">or</span>
<div class="flex-grow h-[1px] bg-outline-variant/20"></div>
</div>
<!-- Social Sign-in -->
<button class="w-full h-12 bg-surface-container-low border border-outline-variant/20 text-on-surface-variant font-medium rounded-eight hover:bg-surface-container-high transition-colors duration-300 flex items-center justify-center gap-3" type="button">
<img alt="Google logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBIaHPkBptnslGbDKY6MRva4MOSUbwZaixONtI3GPno8ivacHLAyW8YKqJA3XNcaeebItWTs0e-rFmB6E7RGKB2eTqcTiMxt8PulAaRpUsc36tMrWONU0CP8u8NmnGemkHFschIwCp5TIVoR1Uqnofw2ierxeAIZA6wm7WJLuwKDt9f1yldOJmHSb5tGcLrZgQdn85y2M4K8zcjjRpLbiwKhTlVt12982gwLBT9IKBhM4EcSFyKIJTIplKqXN34K-3kPJL2CBTwKYja"/>
<span class="text-sm">Sign in with Google</span>
</button>
</form>
</div>
<!-- Footer Actions -->
<div class="mt-10 text-center">
<div class="flex items-center justify-center gap-4 pt-4">
<a class="text-[10px] font-medium uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 rounded-full bg-outline-variant/40"></span>
<a class="text-[10px] font-medium uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
</div>
</main>
<!-- Decorative Elements -->
<div class="fixed bottom-0 left-0 p-12 hidden lg:block opacity-20 pointer-events-none">
<div class="w-64 h-64 rounded-full bg-primary/10 blur-3xl"></div>
</div>
</body></html>
